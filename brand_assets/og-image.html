<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: #1B4332;
  }
  .bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #081C15 0%, #1B4332 50%, #2D6A4F 100%);
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }
  .accent {
    position: absolute; right: -80px; top: -80px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(232,106,16,0.18) 0%, transparent 70%);
  }
  .accent2 {
    position: absolute; left: -60px; bottom: -60px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(64,145,108,0.15) 0%, transparent 70%);
  }
  .content {
    position: relative; z-index: 2;
    padding: 60px 80px;
    height: 100%;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top { display: flex; align-items: center; gap: 16px; }
  .badge {
    background: rgba(232,106,16,0.15);
    border: 1px solid rgba(232,106,16,0.4);
    color: #E86A10; font-size: 11px; font-weight: 800;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 100px;
  }
  .available {
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
  .middle { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px 0; }
  h1 {
    color: #fff;
    font-size: 62px; font-weight: 900; line-height: 1.0;
    letter-spacing: -0.03em; margin-bottom: 20px;
  }
  h1 span { color: #E86A10; }
  .sub {
    color: rgba(255,255,255,0.6); font-size: 22px; font-weight: 400; line-height: 1.5;
  }
  .bottom { display: flex; align-items: center; justify-content: space-between; }
  .phone {
    display: flex; align-items: center; gap: 12px;
    background: #E86A10; color: #fff;
    font-size: 22px; font-weight: 800; letter-spacing: 0.01em;
    padding: 14px 28px; border-radius: 12px;
  }
  .zones { display: flex; gap: 12px; }
  .zone {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600;
    padding: 8px 16px; border-radius: 8px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg"></div>
<div class="noise"></div>
<div class="accent"></div>
<div class="accent2"></div>
<div class="content">
  <div class="top">
    <div class="badge">Serrurier 24h/24 · 7j/7</div>
    <div class="available"><div class="dot"></div>Disponible maintenant</div>
  </div>
  <div class="middle">
    <h1>JHD <span>Serrurerie</span><br>Charente-Maritime</h1>
    <p class="sub">Dépannage urgence en 20 min · Tarifs agréés assurances</p>
  </div>
  <div class="bottom">
    <div class="phone">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
      07 87 37 28 81
    </div>
    <div class="zones">
      <div class="zone">La Rochelle</div>
      <div class="zone">Île de Ré</div>
      <div class="zone">Niort</div>
      <div class="zone">Poitiers</div>
    </div>
  </div>
</div>
</body>
</html>
